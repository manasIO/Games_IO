<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mouse Shooter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: monospace;
    color: #fff;
    user-select: none;
  }
  #game { cursor: none; display: block; border: 1px solid #1a3a5c; }
  #info { margin-top: 10px; color: #446; font-size: 13px; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="info">Move mouse to aim &nbsp;|&nbsp; Click to shoot &nbsp;|&nbsp; Don't let enemies reach you</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const W = canvas.width  = 800;
const H = canvas.height = 580;

// ── state ────────────────────────────────────────────────────────────────────
let score, lives, wave, gameOver, started;
let bullets, enemies, particles, sparks;
let spawnTimer, spawnInterval;
let hitFlash = 0;

const mouse = { x: W / 2, y: H / 2 };
const player = { x: W / 2, y: H / 2, r: 18, angle: 0 };

function reset() {
  score = 0; lives = 5; wave = 1; gameOver = false; started = false;
  bullets = []; enemies = []; particles = []; sparks = [];
  spawnTimer = 0; spawnInterval = 90;
  hitFlash = 0;
}
reset();

// ── input ────────────────────────────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouse.x = e.clientX - r.left;
  mouse.y = e.clientY - r.top;
});

let canShoot = true;
canvas.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  if (gameOver) { reset(); started = true; return; }
  if (!started) { started = true; return; }
  if (canShoot) {
    shoot();
    canShoot = false;
  }
});
canvas.addEventListener('mouseup', () => { canShoot = true; });

// ── shooting ─────────────────────────────────────────────────────────────────
function shoot() {
  const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
  const speed = 14;
  bullets.push({
    x: player.x + Math.cos(angle) * (player.r + 10),
    y: player.y + Math.sin(angle) * (player.r + 10),
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    r: 5, life: 1
  });
  // muzzle sparks
  for (let i = 0; i < 5; i++) {
    const a = angle + (Math.random() - 0.5) * 0.6;
    sparks.push({
      x: player.x + Math.cos(angle) * (player.r + 10),
      y: player.y + Math.sin(angle) * (player.r + 10),
      vx: Math.cos(a) * (Math.random() * 6 + 2),
      vy: Math.sin(a) * (Math.random() * 6 + 2),
      life: 1, r: Math.random() * 3 + 1, color: '255,200,80'
    });
  }
}

// ── spawn ─────────────────────────────────────────────────────────────────────
function spawnEnemy() {
  const side = Math.floor(Math.random() * 4);
  let x, y;
  if (side === 0) { x = Math.random() * W; y = -25; }
  else if (side === 1) { x = W + 25;  y = Math.random() * H; }
  else if (side === 2) { x = Math.random() * W; y = H + 25; }
  else             { x = -25;  y = Math.random() * H; }

  const hp  = 1 + Math.floor(wave / 4);
  const spd = 0.8 + wave * 0.15 + Math.random() * 0.4;
  const r   = 14 + Math.floor(wave / 3) * 2;
  const hue = Math.random() < 0.25 ? 280 : 0; // purple elites vs red
  enemies.push({ x, y, r, speed: spd, hp, maxHp: hp, hue });
}

// ── particles ─────────────────────────────────────────────────────────────────
function explode(x, y, count, color) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd   = Math.random() * 5 + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 1, r: Math.random() * 5 + 2, color
    });
  }
}

// ── update ────────────────────────────────────────────────────────────────────
function update() {
  if (!started || gameOver) return;

  player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
  if (hitFlash > 0) hitFlash--;

  // bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx; b.y += b.vy;
    if (b.x < -20 || b.x > W + 20 || b.y < -20 || b.y > H + 20)
      bullets.splice(i, 1);
  }

  // sparks
  for (let i = sparks.length - 1; i >= 0; i--) {
    const s = sparks[i];
    s.x += s.vx; s.y += s.vy;
    s.vx *= 0.9; s.vy *= 0.9;
    s.life -= 0.07;
    if (s.life <= 0) sparks.splice(i, 1);
  }

  // particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.93; p.vy *= 0.93;
    p.life -= 0.04;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    const ang = Math.atan2(player.y - e.y, player.x - e.x);
    e.x += Math.cos(ang) * e.speed;
    e.y += Math.sin(ang) * e.speed;

    // hit player?
    if (Math.hypot(player.x - e.x, player.y - e.y) < player.r + e.r - 4) {
      enemies.splice(i, 1);
      lives--;
      hitFlash = 20;
      explode(player.x, player.y, 10, '255,80,80');
      if (lives <= 0) gameOver = true;
      continue;
    }

    // hit bullet?
    let killed = false;
    for (let j = bullets.length - 1; j >= 0; j--) {
      const b = bullets[j];
      if (Math.hypot(b.x - e.x, b.y - e.y) < b.r + e.r) {
        bullets.splice(j, 1);
        e.hp--;
        explode(b.x, b.y, 4, `${e.hue === 0 ? '255,140,60' : '200,100,255'}`);
        if (e.hp <= 0) {
          killed = true;
          score += (10 + wave * 5) * e.maxHp;
          explode(e.x, e.y, 14, `${e.hue === 0 ? '255,80,40' : '180,60,255'}`);
          enemies.splice(i, 1);
        }
        break;
      }
    }
    if (killed) continue;
  }

  // spawn
  spawnTimer++;
  if (spawnTimer >= spawnInterval) {
    spawnEnemy();
    spawnTimer = 0;
    spawnInterval = Math.max(18, 90 - wave * 6);
    if (enemies.length === 0 && spawnInterval > 40) {
      for (let k = 0; k < wave; k++) spawnEnemy();
    }
  }

  // wave based on score
  wave = 1 + Math.floor(score / 500);
}

// ── draw ──────────────────────────────────────────────────────────────────────
function drawGrid() {
  ctx.strokeStyle = 'rgba(0,80,180,0.08)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= W; x += 50) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y <= H; y += 50) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

function drawPlayer() {
  ctx.save();
  ctx.translate(player.x, player.y);
  ctx.rotate(player.angle);

  // glow
  ctx.shadowBlur = hitFlash > 0 ? 30 : 15;
  ctx.shadowColor = hitFlash > 0 ? '#ff4040' : '#44aaff';

  // body
  ctx.beginPath();
  ctx.arc(0, 0, player.r, 0, Math.PI * 2);
  ctx.fillStyle = hitFlash > 0 ? '#ff6060' : '#2288ff';
  ctx.fill();
  ctx.strokeStyle = hitFlash > 0 ? '#ffaaaa' : '#88ccff';
  ctx.lineWidth = 2;
  ctx.stroke();

  // barrel
  ctx.fillStyle = hitFlash > 0 ? '#ffaaaa' : '#aaddff';
  ctx.beginPath();
  ctx.roundRect(player.r - 2, -4, 16, 8, 3);
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawBullets() {
  bullets.forEach(b => {
    ctx.save();
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#00ffff';
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fillStyle = '#00ffff';
    ctx.fill();
    ctx.restore();
  });
}

function drawEnemies() {
  enemies.forEach(e => {
    const t = e.hp / e.maxHp;
    ctx.save();
    ctx.shadowBlur = 10;
    ctx.shadowColor = e.hue === 0 ? '#ff3030' : '#cc44ff';
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
    ctx.fillStyle = e.hue === 0
      ? `rgb(${200 + Math.round(55 * t)},${Math.round(40 * t)},${Math.round(40 * t)})`
      : `rgb(${Math.round(160 * t)},${Math.round(30 * t)},${200 + Math.round(55 * t)})`;
    ctx.fill();
    ctx.strokeStyle = e.hue === 0 ? '#ff8888' : '#dd88ff';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();

    // health pip
    if (e.maxHp > 1) {
      const bw = e.r * 2;
      ctx.fillStyle = '#333';
      ctx.fillRect(e.x - e.r, e.y - e.r - 8, bw, 4);
      ctx.fillStyle = e.hue === 0 ? '#ff5555' : '#cc55ff';
      ctx.fillRect(e.x - e.r, e.y - e.r - 8, bw * t, 4);
    }
  });
}

function drawParticles() {
  [...particles, ...sparks].forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.shadowBlur = 6;
    ctx.shadowColor = `rgba(${p.color},1)`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgb(${p.color})`;
    ctx.fill();
    ctx.restore();
  });
}

function drawCrosshair() {
  const mx = mouse.x, my = mouse.y;
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.lineWidth = 1.5;
  ctx.shadowBlur = 4;
  ctx.shadowColor = '#fff';
  ctx.beginPath();
  ctx.arc(mx, my, 11, 0, Math.PI * 2);
  ctx.stroke();
  [[mx - 18, my, mx - 5, my],[mx + 5, my, mx + 18, my],
   [mx, my - 18, mx, my - 5],[mx, my + 5, mx, my + 18]].forEach(([x1,y1,x2,y2]) => {
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  });
  ctx.restore();
}

function drawHUD() {
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0, 0, W, 44);

  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`SCORE  ${score}`, 16, 28);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#aaa';
  ctx.font = '16px monospace';
  ctx.fillText(`WAVE  ${wave}`, W / 2, 28);

  // lives (hearts)
  ctx.textAlign = 'right';
  ctx.font = '20px monospace';
  for (let i = 0; i < 5; i++) {
    ctx.fillStyle = i < lives ? '#ff4466' : '#333';
    ctx.fillText('♥', W - 16 - i * 28, 28);
  }
}

function drawOverlay(title, sub, hint) {
  ctx.fillStyle = 'rgba(0,0,0,0.72)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.shadowBlur = 20;
  ctx.shadowColor = title === 'GAME OVER' ? '#ff3333' : '#44aaff';
  ctx.fillStyle = title === 'GAME OVER' ? '#ff4444' : '#44aaff';
  ctx.font = 'bold 64px monospace';
  ctx.fillText(title, W / 2, H / 2 - 50);

  ctx.shadowBlur = 0;
  ctx.fillStyle = '#ccc';
  ctx.font = '26px monospace';
  ctx.fillText(sub, W / 2, H / 2 + 10);

  ctx.fillStyle = '#666';
  ctx.font = '18px monospace';
  ctx.fillText(hint, W / 2, H / 2 + 55);
  ctx.textAlign = 'left';
}

// ── loop ──────────────────────────────────────────────────────────────────────
function loop() {
  update();

  ctx.fillStyle = '#060610';
  ctx.fillRect(0, 0, W, H);
  drawGrid();
  drawParticles();
  drawBullets();
  drawEnemies();
  drawPlayer();
  drawCrosshair();
  drawHUD();

  if (!started && !gameOver)
    drawOverlay('MOUSE SHOOTER', 'Click anywhere to start', 'Move to aim  •  Click to fire');
  else if (gameOver)
    drawOverlay('GAME OVER', `Score: ${score}  |  Wave: ${wave}`, 'Click to play again');

  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
